name: Build and Release .deb

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper devscripts build-essential fakeroot

      - name: Build Debian package
        run: |
          # The -b flag builds only the binary package
          # The -us -uc flags skip signing
          dpkg-buildpackage -us -uc -b -rfakeroot

      - name: Find and Rename package
        run: |
          # Find the generated .deb file in the parent directory and move it here
          DEB_FILE=$(find .. -name "xzp-slash_*.deb" | head -n 1)
          if [ -z "$DEB_FILE" ]; then
            echo "Error: .deb file not found"
            exit 1
          fi
          mv "$DEB_FILE" xzp-slash.deb

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: xzp-slash.deb
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup APT Repository for GitHub Pages
        run: |
          mkdir -p repo
          cp xzp-slash.deb repo/
          cd repo
          sudo apt-get install -y dpkg-dev
          bash ../scripts/update-repo.sh
          # Add a simple index.html for the repo
          echo "<html><body><h1>xzp-slash APT Repository</h1><p>Add this to your sources: deb [trusted=yes] https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/ ./</p></body></html>" > index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          force_orphan: true
